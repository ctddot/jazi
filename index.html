<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OpenClaude</title>

<style>
/* (ALL YOUR ORIGINAL CSS REMAINS EXACTLY THE SAME) */
</style>

</head>
<body>

<!-- (ALL YOUR ORIGINAL HTML UI STRUCTURE REMAINS EXACTLY THE SAME) -->

<script>

// ── STATE ──
let cfg={baseUrl:'',apiKey:'',model:'',system:'You are a helpful, knowledgeable assistant.'};
let chats=[],activeId=null,streaming=false,ctrl=null;

/* ALL ORIGINAL CONSTANTS + INIT CODE UNCHANGED */

////////////////////////////////////////////////////
/////////////// SEND FUNCTION (UPDATED) ////////////
////////////////////////////////////////////////////

async function send(){
  if(streaming){if(ctrl)ctrl.abort();return;}

  const ta=document.getElementById('ta');
  const txt=ta.value.trim();
  if(!txt)return;
  if(!cfg.baseUrl||!cfg.model){toggleSettings();return;}
  if(!activeId)newChat();

  const chat=activeChat();

  chat.messages.push({role:'user',content:txt});

  if(chat.title==='New Chat')
    chat.title=txt.slice(0,40)+(txt.length>40?'…':'');

  saveChats();
  renderChatList();

  const el=document.getElementById('msgs');

  showMsgs();

  const ub=document.createElement('div');
  ub.className='msg user';
  ub.innerHTML=`<div class="msg-bubble">${esc(txt)}</div>`;

  el.appendChild(ub);

  ta.value='';
  ta.style.height='auto';

  scrollB();

  const tb=document.createElement('div');
  tb.className='msg ai';
  tb.id='__t';

  tb.innerHTML=`<div class="msg-icon"><span class="ast">✳</span></div>
  <div class="msg-bubble">
  <div class="typing"><span></span><span></span><span></span></div>
  </div>`;

  el.appendChild(tb);

  scrollB();

  setStream(true);

  try{

    const reply = await streamCall(chat.messages);

    // FIX #1: Convert streaming bubble into final message
    const live = document.getElementById('__live');

    if(live){
      live.id='';
      chat.messages.push({role:'assistant',content:reply});
      saveChats();
    }

  }catch(e){

    const tb=document.getElementById('__t');

    if(tb)tb.remove();

    if(e.name!=='AbortError'){

      const eb=document.createElement('div');

      eb.className='msg ai';

      eb.innerHTML=`<div class="msg-icon"><span class="ast">✳</span></div>
      <div class="err-bubble">⚠ ${er(e.message)}</div>`;

      el.appendChild(eb);

      scrollB();
    }

  }finally{

    setStream(false);

  }

}

////////////////////////////////////////////////////
//////////// STREAM CALL FUNCTION //////////////////
////////////////////////////////////////////////////

async function streamCall(messages){

  ctrl=new AbortController();

  const {baseUrl,apiKey,model,system}=cfg;

  const h={'Content-Type':'application/json'};

  if(apiKey&&apiKey!=='none')
    h['Authorization']=`Bearer ${apiKey}`;

  const body=JSON.stringify({
    model,
    stream:true,
    messages:[
      ...(system?[{role:'system',content:system}]:[]),
      ...messages.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}))
    ]
  });

  const res=await fetch(`${baseUrl}/chat/completions`,{
    method:'POST',
    headers:h,
    body,
    signal:ctrl.signal
  });

  if(!res.ok){
    const t=await res.text();
    throw new Error(`API ${res.status}: ${t.slice(0,200)}`);
  }

  const tb=document.getElementById('__t');

  const el=document.getElementById('msgs');

  const lb=document.createElement('div');

  lb.className='msg ai';
  lb.id='__live';

  lb.innerHTML=`<div class="msg-icon"><span class="ast">✳</span></div>
  <div class="msg-bubble" id="__lt"></div>`;

  if(tb)tb.replaceWith(lb);
  else el.appendChild(lb);

  const lt=document.getElementById('__lt');

  let full='';

  const reader=res.body.getReader();

  const dec=new TextDecoder();

  while(true){

    const {done,value}=await reader.read();

    if(done)break;

    const chunk=dec.decode(value,{stream:true});

    for(const line of chunk.split('\n')){

      if(!line.startsWith('data:'))continue;

      const data=line.slice(5).trim();

      if(data==='[DONE]')break;

      try{

        const j=JSON.parse(data);

        const delta=j.choices?.[0]?.delta?.content;

        // FIX #2: Prevent duplicate Groq token chunks
        if(delta && !full.endsWith(delta)){

          full+=delta;

          lt.innerHTML=md(full);

          scrollB();

        }

      }catch{}

    }

  }

  lb.id='';

  return full;

}

</script>

</body>
</html>
